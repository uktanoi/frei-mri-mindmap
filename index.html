# F-REIのMRI

## モモ研究

### 研究の問い
- 果実の成熟、軟化、肥大は内部でどの順序で進むのか

### MRIで見るもの
- 水分分布
- 物質移動
- 軟化に先行する内部変化

### 組み合わせる技術
- X線CT
- AFM
- 細胞壁解析
- 香り、食感、成分解析

### 主な連携
- 石丸先生
- 吉見先生
- 河地UL
- 田野井USL

### 出口
- モモ果実の成熟モデル
- 品質予測
- 選果段階での傷発見
- 無傷確認による高付加価値化
- モモユニットの計測基盤

## 土壌中の根研究

### 研究の問い
- 根は土壌中でどのように伸び、水や養分を獲得するのか

### 唯一性
- 土壌中の根を水素シグナルとして直接見る
- 実質的にMRIと中性子ラジオグラフィに限られる

### MRIで見るもの
- 根系発達
- 根圏水分
- 吸水の時系列変化

### 組み合わせる技術
- 中性子ラジオグラフィ
- X線CT
- 土壌構造解析
- 環境制御
- フェノタイピング
- AI画像解析

### FS
- 二瓶ULと拝師先生
- 土壌中の根の観察

### 主な連携
- 二瓶UL
- 信濃UL
- 第2分野
- 土壌・植物マルチダイナミクス研究

### 出口
- 地下部フェノタイピング
- 灌水、施肥技術

## 樹木の幹の中の流れ研究

### 研究の問い
- 幹の中で水はいつ、どの方向へ、どの速度で流れるか

### MRIで見るもの
- 木部液流
- 流速分布
- 日変化
- 季節変化
- 乾燥、高温ストレス応答

### 組み合わせる技術
- 植物RIイメージング技術
- 11CO2による転流解析
- 樹木生理
- 果樹栽培
- 既存の木部液流研究

### 主な連携
- 福田先生
- 拝師先生
- MRTechnology

### 出口
- 樹木・果樹の水利用モデル
- モモ研究への技術移植

## F-REIへのインストール

### 研究の問い
- どの仕様のMRIを、どこに置き、誰が運用するのか

### 位置づけ
- AI4SのDeep phenotyping基盤として活用する

### MRIで見るもの
- モモ
- 土壌中の根
- 樹木の幹
- 共通して扱える試料サイズと測定条件

### 組み合わせる技術
- RIイメージング
- X線CT
- AFM
- 画像解析
- AI解析
- データ基盤

### 導入シナリオ
- 福田先生は樹木用MRIを2台保有
- 2029年頃の引退に合わせる
- 福田先生と装置がF-REIに来る可能性が高い
- 福田ラボに平川氏（博士）
- 優れたMRI研究者を雇用できるチャンス

### 人材・FS
- 田野井ラボと福田ラボのFS
  - 栗田助教（田野井ラボ）
  - 平川氏（福田ラボ）

### 主なユーザー
- 植物・樹木・作物・生態系の研究者
- 第2分野
- 第4分野
- 二瓶UL
- 信濃UL
- 河地UL
- 田野井USL

### 整備・運用項目
- 装置仕様
- MRI室
- 磁場・安全管理
- 運用体制
- 費用
- 共同利用ルール
